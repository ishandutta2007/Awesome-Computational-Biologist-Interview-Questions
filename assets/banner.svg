<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bg)" />

  <!-- Animated background elements (floating nodes/cells) -->
  <g fill="rgba(255, 255, 255, 0.05)">
    <circle cx="200" cy="150" r="40">
      <animate attributeName="cy" values="150;130;150" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.05;0.1;0.05" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="1000" cy="250" r="60">
      <animate attributeName="cy" values="250;280;250" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="100" r="30">
      <animate attributeName="cy" values="100;80;100" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="50">
      <animate attributeName="cy" values="300;320;300" dur="8s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- DNA Strand abstraction -->
  <g stroke="#14b8a6" stroke-width="2" opacity="0.6">
    <path d="M -100,200 Q 50,100 200,200 T 500,200 T 800,200 T 1100,200 T 1400,200" fill="none">
       <animate attributeName="d" values="M -100,200 Q 50,100 200,200 T 500,200 T 800,200 T 1100,200 T 1400,200; M -100,200 Q 50,300 200,200 T 500,200 T 800,200 T 1100,200 T 1400,200; M -100,200 Q 50,100 200,200 T 500,200 T 800,200 T 1100,200 T 1400,200" dur="10s" repeatCount="indefinite" />
    </path>
    <path d="M -100,200 Q 50,300 200,200 T 500,200 T 800,200 T 1100,200 T 1400,200" fill="none" stroke="#8b5cf6">
       <animate attributeName="d" values="M -100,200 Q 50,300 200,200 T 500,200 T 800,200 T 1100,200 T 1400,200; M -100,200 Q 50,100 200,200 T 500,200 T 800,200 T 1100,200 T 1400,200; M -100,200 Q 50,300 200,200 T 500,200 T 800,200 T 1100,200 T 1400,200" dur="10s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- Central Text -->
  <text x="600" y="190" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    Computational Biologist
  </text>
  <text x="600" y="250" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="300" fill="#cbd5e1" text-anchor="middle" letter-spacing="6">
    INTERVIEW QUESTIONS
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
  </text>
  
  <!-- Floating connection lines to represent computation/networks -->
  <g stroke="#38bdf8" stroke-width="1.5" opacity="0.4">
    <line x1="200" y1="150" x2="400" y2="300">
       <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite" />
    </line>
    <line x1="800" y1="100" x2="1000" y2="250">
       <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="300" x2="800" y2="100">
       <animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite" />
    </line>
    <!-- Cross connections -->
    <line x1="200" y1="150" x2="800" y2="100">
       <animate attributeName="opacity" values="0.1;0.3;0.1" dur="7s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="300" x2="1000" y2="250">
       <animate attributeName="opacity" values="0.1;0.3;0.1" dur="8s" repeatCount="indefinite" />
    </line>
  </g>
</svg>
